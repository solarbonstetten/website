backend:
  name: github
  repo: enbieri/solarbonstetten_poc
  branch: main
media_folder: public/images
public_folder: /images
collections:
  - name: news
    label: News
    folder: src/content/news
    create: true
    fields:
      - { label: Titel, name: title, widget: string }
      - { label: Datum, name: date, widget: datetime }
      - { label: Bild, name: image, widget: image, required: false }
      - { label: Text, name: body, widget: markdown }
  - name: projekte
    label: Projekte
    folder: src/content/projekte
    create: true
    fields:
      - { label: Titel, name: title, widget: string }
      - { label: Beschreibung, name: body, widget: markdown }
  - name: solaranlagen
    label: Solaranlagen
    folder: src/content/solaranlagen
    create: true
    fields:
      - { label: Titel, name: title, widget: string }
      - { label: Kategorie, name: badge, widget: string, hint: "z.B. Schulanlage oder Privathaus" }
      - { label: Reihenfolge, name: reihenfolge, widget: number, default: 99 }
      - { label: Finanzierung, name: finanzierung, widget: string }
      - { label: Anlagetyp, name: typ, widget: string }
      - { label: Ausrichtung, name: ausrichtung, widget: string }
      - { label: Leistung, name: leistung, widget: string, hint: "z.B. 28.08 kWp" }
      - { label: Jahresertrag, name: jahresertrag, widget: string, hint: "z.B. ~25'000 kWh" }
      - { label: Module, name: module, widget: string }
      - { label: Monitoring URL, name: monitoring_url, widget: string, required: false }
      - { label: Zusatzinfos, name: body, widget: markdown, required: false }
  - name: links
    label: Links
    folder: src/content/links
    create: true
    fields:
      - { label: Titel, name: title, widget: string }
      - { label: Beschreibung, name: beschreibung, widget: string }
      - { label: URL, name: url, widget: string }
      - label: Kategorie
        name: kategorie
        widget: select
        options:
          - Behörden & Verbände
          - Umwelt & Nachhaltigkeit
          - Energie & Solar
          - Region & Gemeinde
      - { label: Reihenfolge, name: reihenfolge, widget: number, default: 99 }
  - name: statuten
    label: Statuten
    files:
      - label: Vereinsstatuten
        name: statuten
        file: src/content/statuten/statuten.md
        fields:
          - { label: Titel, name: title, widget: string }
          - { label: Stand (Datum), name: stand, widget: string, hint: "z.B. 1. Oktober 2011" }
          - { label: Inhalt, name: body, widget: markdown }
